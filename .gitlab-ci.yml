image: node:20-alpine

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - node_modules/
    - .pnpm-store/

variables:
  PNPM_HOME: .pnpm-store
  DEPENDABOT_IMAGE: docker.io/andrcuns/dependabot-gitlab:0.23.0

test_async:
  script:
    - corepack enable
    - pnpm install
    - pnpm test
    - pnpm lint

.dependabot-gitlab:
  image:
    name: $DEPENDABOT_IMAGE
    entrypoint: ['']
  variables:
    GIT_STRATEGY: none
    RAILS_ENV: production
    SECRET_KEY_BASE: key
    PACKAGE_MANAGER: pnpm
    SETTINGS__GITLAB_URL: $CI_SERVER_URL
    SETTINGS__STANDALONE: 'true'
    SETTINGS__LOG_COLOR: 'true'
  script:
    - cd /home/dependabot/app
    - bundle exec rake "dependabot:update[$PROJECT_PATH,$PACKAGE_MANAGER,$DIRECTORY]"

dependabot:
  extends: .dependabot-gitlab
  rules:
    - if: $DEPENDENCY_UPDATES_DISABLED
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $PACKAGE_MANAGER_SET =~ /(\bnpm|pnpm\b)/'
